name: Daily Auto Push

on:
  schedule:
    # Runs every day at 00:00 UTC (adjust timezone as needed)
    # Format: minute hour day month day-of-week
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  daily-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          # Using your actual GitHub email - commits WILL count as your contributions
          # Make sure karamvirh71@gmail.com is verified in GitHub Settings > Emails
          git config --local user.email "karamvirh71@gmail.com"
          git config --local user.name "karamvirsingh1998"

      - name: Create or update daily log
        run: |
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M:%S)
          mkdir -p weekend-projects
          echo "Daily commit: $DATE at $TIME" >> weekend-projects/daily-commits.log
          echo "Last updated: $(date)" >> weekend-projects/daily-commits.log
          echo "" >> weekend-projects/daily-commits.log

      - name: Commit and push
        run: |
          # Pick a random number of commits between 0 and 5
          COMMITS=$(( RANDOM % 6 ))
          echo "Planned auto-commits today: $COMMITS" >> weekend-projects/daily-commits.log

          # If 0, just record that in the log and exit without creating new commits
          if [ "$COMMITS" -eq 0 ]; then
            git add weekend-projects/daily-commits.log
            if git diff --staged --quiet; then
              echo "No changes to commit today."
              exit 0
            fi
            git commit -m "Daily log update (0 auto-commits): $(date +%Y-%m-%d)"
            git push origin main
            exit 0
          fi

          # Make N commits by appending to the log and committing each time
          for i in $(seq 1 "$COMMITS"); do
            echo "Auto commit #$i on $(date +%Y-%m-%d) at $(date +%H:%M:%S)" >> weekend-projects/daily-commits.log
            git add weekend-projects/daily-commits.log
            # Only commit if there are staged changes
            if git diff --staged --quiet; then
              continue
            fi
            git commit -m "Daily auto-commit #$i: $(date +%Y-%m-%d)"
          done

          # Push all new commits (if any) at once
          git push origin main
